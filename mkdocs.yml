site_name: lazy-harness
site_description: A cross-platform harnessing framework for AI coding agents
site_url: https://lazynet.github.io/lazy-harness/
repo_url: https://github.com/lazynet/lazy-harness
repo_name: lazynet/lazy-harness
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

validation:
  links:
    not_found: info
  nav:
    omitted_files: info

plugins:
  - search
  - mermaid2
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Why:
    - The problem: why/problem.md
    - Memory model: why/memory-model.md
    - Philosophy: why/philosophy.md
  - How:
    - Hooks: how/hooks.md
    - Memory compound loop: how/memory-compound.md
    - Knowledge pipeline: how/knowledge-pipeline.md
    - Metrics ingest: how/metrics-ingest.md
    - Profiles and deploy: how/profiles-and-deploy.md
  - Getting started:
    - Install: getting-started/install.md
    - First run: getting-started/first-run.md
    - Migrating: getting-started/migrating.md
  - Reference:
    - CLI: reference/cli.md
    - Config: reference/config.md
  - Architecture:
    - Overview: architecture/overview.md
  - Backlog: backlog.md
