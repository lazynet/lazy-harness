site_name: lazy-harness
site_description: A cross-platform harnessing framework for AI coding agents
site_url: https://lazynet.github.io/lazy-harness/
repo_url: https://github.com/lazynet/lazy-harness
repo_name: lazynet/lazy-harness
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

validation:
  links:
    not_found: info
  nav:
    omitted_files: info

plugins:
  - search
  - mermaid2
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Why:
    - The problem: why/problem.md
    - Memory model: why/memory-model.md
    - Philosophy: why/philosophy.md
  - How:
    - Hooks: how/hooks.md
    - Memory compound loop: how/memory-compound.md
    - Knowledge pipeline: how/knowledge-pipeline.md
    - Profiles and deploy: how/profiles-and-deploy.md
  - Getting started:
    - Install: getting-started/install.md
    - First run: getting-started/first-run.md
    - Migrating: getting-started/migrating.md
  - Reference:
    - CLI: reference/cli.md
    - Config: reference/config.md
  - Architecture:
    - Overview: architecture/overview.md
    - Decisions:
      - Index: architecture/decisions/index.md
      - ADR-001 Hybrid architecture: architecture/adrs/001-hybrid-architecture.md
      - ADR-002 Python + uv distribution: architecture/adrs/002-python-uv-distribution.md
      - ADR-003 TOML config format: architecture/adrs/003-toml-config-format.md
      - ADR-004 Agent adapter pattern: architecture/adrs/004-agent-adapter-pattern.md
      - ADR-005 XDG-first path resolution: architecture/adrs/005-xdg-first-paths.md
      - ADR-006 Hooks as subprocess + JSON: architecture/adrs/006-hooks-subprocess-json.md
      - ADR-007 Parallel bootstrap migration: architecture/adrs/007-parallel-bootstrap-migration.md
      - ADR-008 Compound loop async worker: architecture/adrs/008-compound-loop-async-worker.md
      - ADR-009 Profile symlink deploy: architecture/adrs/009-profile-symlink-deploy.md
      - ADR-010 Pre-compact preservation: architecture/adrs/010-pre-compact-preservation.md
      - ADR-011 Session export + classification: architecture/adrs/011-session-export-and-classification.md
      - ADR-012 SQLite monitoring: architecture/adrs/012-sqlite-monitoring.md
      - ADR-013 Unified scheduler backends: architecture/adrs/013-scheduler-unified-backends.md
      - ADR-014 Migration engine + rollback: architecture/adrs/014-migration-engine-rollback.md
      - ADR-015 Strict TDD workflow: architecture/adrs/015-strict-tdd-workflow.md
      - ADR-016 Knowledge directory + QMD optional: architecture/adrs/016-knowledge-dir-qmd-optional.md
      - ADR-017 Selftest as health check: architecture/adrs/017-selftest-as-health-check.md
  - Backlog: backlog.md
